<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{META_TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cmask id='biteMask'%3E%3Crect width='100' height='100' fill='white'/%3E%3Ccircle cx='48' cy='60' r='12' fill='black'/%3E%3Ccircle cx='25' cy='38' r='12' fill='black'/%3E%3Ccircle cx='41' cy='30' r='10' fill='black'/%3E%3C/mask%3E%3C/defs%3E%3Cg mask='url(%23biteMask)'%3E%3Crect x='60' y='8' width='16' height='78' rx='8' fill='%23111111'/%3E%3Crect x='22' y='34' width='48' height='52' rx='16' fill='%23111111'/%3E%3C/g%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23E5384B'/%3E%3Ccircle cx='12' cy='28' r='2.5' fill='%23E5384B'/%3E%3Ccircle cx='34' cy='14' r='2' fill='%23E5384B'/%3E%3Ccircle cx='14' cy='16' r='1.5' fill='%23E5384B'/%3E%3Ccircle cx='26' cy='10' r='1.5' fill='%23E5384B'/%3E%3C/svg%3E">
</head>
<body>
  <!-- Header Minimal -->
  <header class="container" style="padding: 24px; display: flex; justify-content: space-between; align-items: center;">
    <a href="/" class="logo-wordmark" style="transform: scale(0.8); transform-origin: left center; text-decoration: none;">
      <svg class="logo-mark" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <mask id="biteMaskTop"><rect width="100" height="100" fill="white"/><circle cx="48" cy="60" r="12" fill="black"/><circle cx="25" cy="38" r="12" fill="black"/><circle cx="41" cy="30" r="10" fill="black"/></mask>
        </defs>
        <g mask="url(#biteMaskTop)"><rect x="60" y="8" width="16" height="78" rx="8" fill="#111111"/><rect x="22" y="34" width="48" height="52" rx="16" fill="#111111"/></g>
        <circle cx="20" cy="20" r="3.5" fill="#E5384B"/><circle cx="12" cy="28" r="2.5" fill="#E5384B"/><circle cx="34" cy="14" r="2" fill="#E5384B"/><circle cx="14" cy="16" r="1.5" fill="#E5384B"/><circle cx="26" cy="10" r="1.5" fill="#E5384B"/>
      </svg>
      <span class="logo-text">windl<span class="logo-period">.</span></span>
    </a>
    <nav style="display: flex; gap: 16px; align-items: center;">
      <a href="/report" class="report-btn">+ Report</a>
    </nav>
  </header>

  {{PRODUCT_CONTENT}}

  <!-- CTA -->
  <section class="bottom-cta">
    <div class="container cta-content">
      <h2>Want to scan this product yourself?<br>Get early access to Dwindl.</h2>
      <div class="email-capture">
        <form class="email-form">
          <input type="text" class="email-input" placeholder="First Name" required>
          <input type="email" class="email-input" placeholder="your@email.com" required>
          <button type="submit" class="email-btn">Join the waitlist</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer Minimal -->
  <footer class="footer container" style="padding: 40px 24px;">
    <div class="footer-bottom">
      <div class="footer-links">
        <a href="/privacy.html">Privacy</a>
        <a href="/terms.html">Terms</a>
        <a href="mailto:support@dwindl.ai">Contact</a>
      </div>
      <div class="footer-copy">&copy; 2026 Dwindl</div>
    </div>
  </footer>
  <script src="/app.js" defer></script>
</body>
</html>
